<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <a href="tierlist.html">Tier List</a>
        <a href="contact.html">Contact Form</a>
    </nav>

    <header>
        <h1>Fast Food Feedback Form</h1>
        <p>Tell me your favorite fast food choices.</p>
    </header>

    <main>
        <form action="#" method="post">

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="favorite">Favorite Fast Food:</label>
                <select id="favorite" name="favorite">
                    <option value="pizza">Pizza</option>
                    <option value="burger">Burger</option>
                    <option value="tacos">Tacos</option>
                    <option value="hotdogs">Hot Dogs</option>
                    <option value="fries">French Fries</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comments">Comments:</label>
                <textarea id="comments" name="comments" rows="4"></textarea>
            </div>

            <button type="submit">Submit</button>

        </form>
    </main>

</body>
</html>
